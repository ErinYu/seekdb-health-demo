version: "3.8"

services:
  seekdb:
    image: oceanbase/seekdb:latest
    container_name: seekdb-demo
    ports:
      - "2881:2881"
      - "2886:2886"
    environment:
      - OB_MEMORY_LIMIT=4G
    volumes:
      - seekdb_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h 127.0.0.1 -P 2881 -uroot -e 'SELECT 1' 2>/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  seekdb_data:
